<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Shirley</title>
    <style>
        /* Estilos base con el marrón oscuro de la captura */
        body {
            background-color: #1c100b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Contenedor principal de los animales, centrado sobre la tarjeta */
        .animals-container {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 120px; /* Espacio entre los dos animales */
            z-index: 1;
        }

        /* Cuadrículas individuales para cada animal con mayor densidad */
        .canvas {
            display: grid;
            grid-template-columns: repeat(20, 10px);
            grid-template-rows: repeat(20, 10px);
            gap: 1px;
        }

        /* Estilo de cada "pixel" emoji de fondo */
        .pixel {
            width: 10px;
            height: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            opacity: 0; /* Ocultos al inicio */
            transform: scale(0.3);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Estado activo progresivo con opacidad translucida idéntica a la captura */
        .active {
            opacity: 0.35;
            transform: scale(1);
        }

        /* Tarjeta flotante central translúcida con desenfoque de fondo */
        .message-card {
            background-color: rgba(25, 15, 10, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 15px;
            padding: 32px 24px;
            width: 85%;
            max-width: 360px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 2; /* Sobre los animales */
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Estilo del texto principal */
        .main-text {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.5;
            color: #eeeeee;
            margin: 0;
            word-wrap: break-word;
        }

        /* Cursor de escritura parpadeante */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 20px;
            background-color: #ffffff;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
